####################################################################
###                          INCLUDES                            ###
####################################################################

[include mainsail.cfg]
[include macros.cfg]
#[include SHT36V3.cfg]
#[include spoolman.cfg]

####################################################################
###                             MCU                              ###
####################################################################

#__________________________ Raspberry Pi ___________________________
[mcu host]
serial: /tmp/klipper_host_mcu

[mcu]
canbus_uuid: 57b55925782f
#restart_method: command

####################################################################
###                           PRINTER                            ###
####################################################################

[printer]
kinematics:corexy
max_velocity: 550
max_accel: 50000
minimum_cruise_ratio: 0.5
max_z_velocity: 15
max_z_accel: 150
square_corner_velocity: 20

[temperature_sensor Fly-Super8Pro_H723]
sensor_type: temperature_mcu
sensor_mcu : mcu

[temperature_sensor Raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

####################################################################
###                          XY Axis                             ###
####################################################################
#_____________________ XY Motor Mapping ____________________________
# 
#                                    BACK  
#             Y1______________Z1______________X1
#              |                                               | 
#              |                                               | 
#              |                                               | 
#          L  |                                               |   R
#          E  |                                               |   I
#          F  |                                               |   G
#          T  |                                               |   H
#              |                                               |   T
#              |                                               | 
#              |  0,0                                        | 
#            X|_Z_______________________Z2_|Y
#.                                 Front
# X
# X1
# Y
# Y1
#_________________________ X On Drive 6 _________________________#
[stepper_x]
step_pin: PE0
dir_pin: !PG3
enable_pin: !PG4
rotation_distance: 40
microsteps: 16
step_pulse_duration: 0.000004
full_steps_per_rotation:400  #set to 400 for 0.9 degree stepper
endstop_pin: SHT36:gpio22
position_endstop: 0
position_min: 0
position_max: 300
homing_retract_dist: 5
homing_speed: 50

[tmc5160 stepper_x] 
cs_pin: PG2
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
sense_resistor: 0.033
run_current: 2.6
interpolate: False

driver_TOFF: 4
driver_DISS2G: 1
driver_DISS2VS: 1
driver_TBL: 0 

#_________________________ X1 On Drive 5 _________________________#
[stepper_x1]
step_pin: PE1
dir_pin: !PF0
enable_pin: !PC15
rotation_distance: 40
microsteps: 16
step_pulse_duration: 0.000004
full_steps_per_rotation:400  #set to 400 for 0.9 degree stepper

[tmc5160 stepper_x1] 
cs_pin: PF1
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
sense_resistor: 0.033
run_current: 2.6
interpolate: False

driver_TOFF: 4
driver_DISS2G: 1
driver_DISS2VS: 1
driver_TBL: 0 

#_________________________ Y On Drive 4 _________________________#
[stepper_y]
step_pin: PE15
dir_pin: !PE11
enable_pin: !PF2
rotation_distance: 40
microsteps: 16
step_pulse_duration: 0.000004
full_steps_per_rotation:400  #set to 400 for 0.9 degree stepper
endstop_pin: PD7
position_endstop: 0
position_min: 0
position_max: 265
homing_speed: 50
homing_retract_dist: 5

[tmc5160 stepper_y] 
cs_pin: PE10
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
sense_resistor: 0.033
run_current: 2.6
interpolate: False

driver_TOFF: 4
driver_DISS2G: 1
driver_DISS2VS: 1
driver_TBL: 0 

#_________________________ Y1 On Drive 3 _________________________#
[stepper_y1]
step_pin: PE14
dir_pin: !PE8
enable_pin: !PE9
rotation_distance: 40
microsteps: 16
step_pulse_duration: 0.000004
full_steps_per_rotation:400  #set to 400 for 0.9 degree stepper

[tmc5160 stepper_y1] 
cs_pin: PE7
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
sense_resistor: 0.033
run_current: 2.6
interpolate: False

driver_TOFF: 4
driver_DISS2G: 1
driver_DISS2VS: 1
driver_TBL: 0 


#_________________________ Z On Drive 2 _________________________#
[stepper_z2]
step_pin: PE4
dir_pin: !PG0
enable_pin: !PG1
gear_ratio: 2:1
rotation_distance: 4
microsteps: 64
step_pulse_duration: 0.000004
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper

[tmc5160 stepper_z2] 
cs_pin: PF15
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
run_current: 1.0
interpolate: False
#stealthchop_threshold: 999999
#driver_TOFF: 0

#_________________________ Z1 On Drive 1 _________________________#
[stepper_z1]
step_pin: PE3
dir_pin: !PF13
enable_pin: !PF14
gear_ratio: 2:1
rotation_distance: 4
microsteps: 64
step_pulse_duration: 0.000004
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper

[tmc5160 stepper_z1] 
cs_pin: PF12
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
run_current: 1.0
interpolate: False
#stealthchop_threshold: 999999
#driver_TOFF: 0

#_________________________ Z2 On Drive 0 _________________________#
[stepper_z]
step_pin: PE2
dir_pin: !PC5
enable_pin: !PF11
gear_ratio: 2:1
rotation_distance: 4
microsteps: 64
step_pulse_duration: 0.000004
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: probe:z_virtual_endstop
position_min: 0
position_max: 450
homing_retract_dist: 10.0
homing_speed: 20
#position_endstop: 2
#position_endstop: -0.5

[tmc5160 stepper_z] 
cs_pin: PC4
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
spi_software_sclk_pin: PB3
run_current: 1.0
interpolate: False
#stealthchop_threshold: 999999
#driver_TOFF: 0

#_________________________ SAFE Z HOMING ____________________________
[safe_z_home]
home_xy_position: 150, 100  
speed: 300
z_hop: 10
z_hop_speed: 10.0

#_________________________ SELF LEVELLING (Z_Tilt) _________________________#
[z_tilt]
z_positions: 
  #-12.642,-10.411 #stepper_z - front left
  #163.567,317.799 #stepper_z1 - back
#  339.776,-10.411 #stepper_z2 - front right
  -20.940, -10.300
  153.268, 317.910
  329.476, -10.300
  
points:
  20, 20
  280, 20
  153, 230
speed: 400
horizontal_move_z: 20
retries: 5
retry_tolerance: 0.01

#_________________________ Bed Mesh _________________________#
[bed_mesh]
algorithm: lagrange
speed: 180
horizontal_move_z: 2.5
mesh_min: 40, 55 #Probe position
mesh_max: 260,230 
probe_count: 6,6
adaptive_margin: 5
#fade_start: 1
#fade_end: 5


